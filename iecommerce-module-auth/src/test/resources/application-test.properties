spring.datasource.url=jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
app.jwt.secret=test-secret-key-must-be-at-least-32-characters-long
app.jwt.expiration-hours=1

# Keycloak (Dummy for tests)
app.keycloak.server-url=http://localhost:8080
app.keycloak.realm=iecommerce
app.keycloak.admin.username=admin
app.keycloak.admin.password=admin
app.keycloak.admin.client-id=admin-cli
app.keycloak.clients.web=iecommerce-web
app.keycloak.clients.admin=iecommerce-admin

# Kong (Dummy for tests)
app.kong.admin-url=http://localhost:8001
