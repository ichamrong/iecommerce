version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: iecommerce-postgres
    environment:
      - POSTGRES_DB=iecommerce
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: iecommerce-keycloak
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/iecommerce
      - KC_DB_USERNAME=admin
      - KC_DB_PASSWORD=admin
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: iecommerce-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: iecommerce-minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
