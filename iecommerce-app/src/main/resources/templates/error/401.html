<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>401 — Unauthorized | IECommerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-from: #0a0f1a;
            --bg-mid: #0d1f3c;
            --bg-to: #111827;
            --accent: #38bdf8;
            --accent2: #818cf8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.10);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-from), var(--bg-mid), var(--bg-to));
            overflow: hidden;
            position: relative;
        }

        /* Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.28;
            animation: drift 14s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 480px;
            height: 480px;
            background: #1d4ed8;
            top: -160px;
            left: -120px;
        }

        .orb-2 {
            width: 360px;
            height: 360px;
            background: #4f46e5;
            bottom: -100px;
            right: -80px;
            animation-delay: 4s;
        }

        .orb-3 {
            width: 260px;
            height: 260px;
            background: #0e7490;
            top: 55%;
            left: 45%;
            animation-delay: 7s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(45px, 25px) scale(1.06);
            }
        }

        /* Grid overlay */
        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        /* Particles */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.5);
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3.5rem 4rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            max-width: 540px;
            width: 90vw;
            animation: card-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.92);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Lock icon with unlock animation */
        .lock-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 76px;
            height: 76px;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(129, 140, 248, 0.12));
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin: 0 auto 1.5rem;
            animation: lock-shake 5s ease-in-out infinite;
        }

        @keyframes lock-shake {

            0%,
            88%,
            100% {
                transform: rotate(0deg) scale(1);
            }

            90% {
                transform: rotate(-8deg) scale(1.05);
            }

            94% {
                transform: rotate(8deg) scale(1.05);
            }

            97% {
                transform: rotate(-4deg) scale(1.02);
            }
        }

        .lock-wrapper svg {
            color: var(--accent);
        }

        .error-code {
            font-size: clamp(5.5rem, 16vw, 8.5rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -4px;
            filter: drop-shadow(0 0 40px rgba(56, 189, 248, 0.35));
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                filter: drop-shadow(0 0 30px rgba(56, 189, 248, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 60px rgba(56, 189, 248, 0.65));
            }
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            margin: 1.25rem auto;
        }

        h1 {
            font-size: 1.55rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.75;
            margin-bottom: 2rem;
        }

        /* Token hint box */
        .hint-box {
            background: rgba(56, 189, 248, 0.06);
            border: 1px solid rgba(56, 189, 248, 0.18);
            border-radius: 0.875rem;
            padding: 1rem 1.25rem;
            text-align: left;
            margin-bottom: 2rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .hint-icon {
            flex-shrink: 0;
            margin-top: 2px;
            color: var(--accent);
            opacity: 0.8;
        }

        .hint-text {
            font-size: 0.83rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .hint-text strong {
            color: rgba(56, 189, 248, 0.9);
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.75rem;
            border-radius: 0.875rem;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0369a1, #4338ca);
            color: #fff;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(3, 105, 161, 0.6);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            color: #fff;
        }

        .btn-swagger {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.11);
            font-size: 0.88rem;
        }

        .btn-swagger:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateY(-2px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.22);
            color: #7dd3fc;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.85rem;
            border-radius: 999px;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #38bdf8;
            animation: blink 1.6s ease infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.15
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid"></div>
    <div class="particles" id="particles"></div>

    <div class="card">
        <div class="status-badge"><span class="dot"></span> 401 Unauthorized</div>

        <div class="lock-wrapper">
            <svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>

        <div class="error-code">401</div>
        <div class="divider"></div>
        <h1>Unauthorized</h1>
        <p>
            You don't have permission to access this resource.<br />
            A valid authentication token is required.
        </p>

        <div class="hint-box">
            <span class="hint-icon">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
                </svg>
            </span>
            <div class="hint-text">
                Use <strong>POST /api/v1/auth/login</strong> to obtain a JWT token,
                then include it as <strong>Authorization: Bearer &lt;token&gt;</strong>
                in all protected requests.
            </div>
        </div>

        <div class="btn-group">
            <a href="/api/v1/auth/login" class="btn btn-primary">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
                </svg>
                Go to Login
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Go Back
            </a>
            <a href="/swagger-ui/index.html" class="btn btn-swagger" target="_blank">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                API Docs
            </a>
        </div>
    </div>

    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 28; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${Math.random() * 3 + 2}px;
        height: ${Math.random() * 3 + 2}px;
        animation-duration: ${Math.random() * 10 + 8}s;
        animation-delay: ${Math.random() * 12}s;
      `;
            container.appendChild(p);
        }
    </script>
</body>

</html>
