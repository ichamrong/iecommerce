<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | IECommerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-from: #0f0c29;
      --bg-mid: #302b63;
      --bg-to: #24243e;
      --accent: #a78bfa;
      --accent2: #60a5fa;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-from), var(--bg-mid), var(--bg-to));
      overflow: hidden;
      position: relative;
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: #7c3aed;
      top: -150px;
      left: -150px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: #2563eb;
      bottom: -100px;
      right: -100px;
      animation-delay: 3s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: #db2777;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 6s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(40px, 30px) scale(1.08);
      }
    }

    /* Particles */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(167, 139, 250, 0.6);
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3.5rem 4rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      max-width: 540px;
      width: 90vw;
      animation: card-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(60px) scale(0.92);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .error-code {
      font-size: clamp(6rem, 18vw, 9rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(167, 139, 250, 0.5));
      animation: pulse-glow 3s ease-in-out infinite;
      letter-spacing: -4px;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        filter: drop-shadow(0 0 30px rgba(167, 139, 250, 0.4));
      }

      50% {
        filter: drop-shadow(0 0 60px rgba(167, 139, 250, 0.8));
      }
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      margin: 1.25rem auto;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 0.875rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.6);
    }

    .btn-secondary {
      background: var(--glass-bg);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--glass-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      color: #fff;
    }

    .btn-swagger {
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 0.88rem;
    }

    .btn-swagger:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      transform: translateY(-2px);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.4s ease infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }
  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="status-badge"><span class="dot"></span> 404 Error</div>
    <div class="error-code">404</div>
    <div class="divider"></div>
    <h1>Page Not Found</h1>
    <p>
      The page you're looking for doesn't exist or has been moved.<br />
      Let's get you back on track.
    </p>
    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Go Home
      </a>
      <a href="javascript:history.back()" class="btn btn-secondary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Go Back
      </a>
      <a href="/swagger-ui/index.html" class="btn btn-swagger" target="_blank">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
        API Docs
      </a>
    </div>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${Math.random() * 4 + 2}px;
        height: ${Math.random() * 4 + 2}px;
        animation-duration: ${Math.random() * 10 + 8}s;
        animation-delay: ${Math.random() * 10}s;
        opacity: ${Math.random() * 0.6 + 0.2};
      `;
      container.appendChild(p);
    }
  </script>
</body>

</html>
