spring:
  application:
    name: iecommerce
  main:
    allow-circular-references: true
  config:
    import: vault://
  cloud:
    vault:
      uri: http://localhost:8200
      token: ${SPRING_CLOUD_VAULT_TOKEN:root}
      kv:
        enabled: true
        backend: secret
        default-context: iecommerce
        application-name: iecommerce
  datasource:
    url: jdbc:postgresql://localhost:5432/iecommerce
    username: ${postgres.username:admin}
    password: ${postgres.password}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/master-changelog.xml
    enabled: true
    # Local/dev convenience: if a changelog file changes after being applied,
    # automatically clear and recompute checksums instead of failing startup.
    clear-checksums: true
    # If you see "Waiting for changelog lock....", a previous run left the lock held.
    # Release it manually: run db/release-liquibase-lock.sql against the database.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.keycloak.server-url}/realms/${app.keycloak.realm}
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
  mail:
    host: localhost
    port: 1025 # MailHog or similar dummy SMTP server

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    display-request-duration: true

server:
  port: 8081
  error:
    whitelabel:
      enabled: false  # Use our custom Thymeleaf error pages



app:
  cors:
    # Comma-separated list of allowed frontend origins (CORS)
    allowed-origins: http://localhost:8082,http://localhost:5173
  keycloak:
    server-url: http://localhost:8080
    realm: iecommerce
    admin:
      username: admin
      password: ${keycloak.admin.password:admin}
      client-id: admin-cli
    clients:
      web: iecommerce-web-client
      admin: iecommerce-admin-client

  kong:
    admin-url: http://localhost:8001
    upstream-url: http://host.docker.internal:8081

logging:
  level:
    org.springframework.modulith: INFO
    com.chamrong: INFO
    # Suppress "Could not safely identify store assignment" when only JPA repos are used (Redis scans same package)
    org.springframework.data.keyvalue.repository.config: WARN
    # Suppress "Marking ChangeSet ... as ran despite precondition failure" for idempotent changeSets (e.g. 34-enrich-address)
    liquibase.changelog: WARN

iecommerce:
  init:
    admin:
      enabled: true
    keycloak:
      enabled: true
    kong:
      enabled: true
  storage:
    r2:
      endpoint: https://dummy.r2.cloudflarestorage.com
      accessKey: dummy
      secretKey: dummy
      bucketName: iecommerce-bucket
      publicUrl: https://cdn.dummy.com

  twilio:
    accountSid: dummy_sid
    authToken: dummy_token
    systemPhoneNumber: "+15555555555"

notification:
  sms:
    provider: twilio # Values: twilio, plasgate, mekong

payment:
  stripe:
    # Local/dev dummy values; real secrets should be provided via Vault or environment
    secret-key: dummy
    webhook-secret: dummy
